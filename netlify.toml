[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  path = "/api/claude"
  function = "claude"

# Let edge function handle /api/* — do NOT redirect these to index.html
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = true

# SPA routing — all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
